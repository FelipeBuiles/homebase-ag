services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homebase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homebase}
      POSTGRES_DB: ${POSTGRES_DB:-homebase}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homebase -d homebase"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: on-failure
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - .env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-homebase}:${POSTGRES_PASSWORD:-homebase}@postgres:5432/${POSTGRES_DB:-homebase}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - homebase_node_modules:/app/node_modules
      - homebase_next:/app/.next
    command: ["npm", "run", "dev"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  pgdata:
  homebase_node_modules:
  homebase_next:
